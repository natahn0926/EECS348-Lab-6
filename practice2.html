<!DOCTYPE html>
<html>
<head>
    <title>Practice 2</title>
    <script src="practice2.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            text-align: center;
            padding: 20px;
        }

        #targetParagraph {
            width: 60%;
            margin: 20px auto;
            padding: 20px;
            border: 2px solid black;
            background-color: rgb(255, 255, 255);
        }

        .input-group {
            margin: 8px 0;
        }

        input {
            width: 80px;
            padding: 5px;
        }

        button {
            margin-top: 15px;
            padding: 8px 14px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Practice 2</h1>

    <p id="targetParagraph">Paragraph to be altered.</p>

    <div class="input-group">
        Border R(0-255): <input type="text" id="borderR">
    </div>
    <div class="input-group">
        Border G(0-255): <input type="text" id="borderG">
    </div>
    <div class="input-group">
        Border B(0-255): <input type="text" id="borderB">
    </div>
    <div class="input-group">
        Border Width: <input type="text" id="borderWidth">
    </div>
    <div class="input-group">
        Background R(0-255): <input type="text" id="bgR">
    </div>
    <div class="input-group">
        Background G(0-255): <input type="text" id="bgG">
    </div>
    <div class="input-group">
        Background B(0-255): <input type="text" id="bgB">
    </div>

    <button onclick="changeColor()">Change the color!</button>
</body>
</html>
